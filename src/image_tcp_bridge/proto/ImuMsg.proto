syntax = "proto3";

package mgx10v.proto;
import "Common.proto";

message ImuMsg {

    Header header = 1;

    Quaternion orientation = 2;
    repeated double orientation_covariance = 3 [packed = true];  // Row major about x, y, z axes

    Vector3 angular_velocity = 4;
    repeated double angular_velocity_covariance = 5 [packed = true];  // Row major about x, y, z axes

    Vector3 linear_acceleration = 6;
    repeated double linear_acceleration_covariance = 7 [packed = true];  // Row major about x, y, z axes
}
