syntax = "proto3";

import "google/protobuf/timestamp.proto";

package mgx10v.proto;

// A raw image
message RawImage {
  reserved 7, 8, 9, 10, 11, 12, 13;
  reserved "frame_id", "shm_name", "shm_offset", "data_size", "sequence",
           "shm_slot", "shm_slot_count";

  // Timestamp of image
  google.protobuf.Timestamp timestamp = 1;

  // Image width
  fixed32 width = 2;

  // Image height
  fixed32 height = 3;

  // Encoding of the raw image data
  //
  // cam_sensor_data currently publishes `bgr8` by default, or `bgra8` when
  // requested through --color-format.
  string encoding = 4;

  // Byte length of a single row
  fixed32 step = 5;

  // Legacy inline raw image data. Current high-rate camera transport sends
  // image bytes as a ZMQ multipart raw payload and leaves this field empty.
  bytes data = 6;

  // Camera exposure time in microseconds.
  fixed32 exposure_us = 14;
}
