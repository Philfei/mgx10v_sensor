syntax = "proto3";

import "google/protobuf/timestamp.proto";

package mgx10v.proto;

// A raw image
message RawImage {
  // Timestamp of image
  google.protobuf.Timestamp timestamp = 1;

  // Frame of reference for the image. The origin of the frame is the optical center of the camera. +x points to the right in the image, +y points down, and +z points into the plane of the image.
  string frame_id = 7;

  // Image width
  fixed32 width = 2;

  // Image height
  fixed32 height = 3;

  // Encoding of the raw image data
  //
  // cam_sensor_data currently publishes `bgr8` by default, or `bgra8` when
  // requested through --color-format.
  string encoding = 4;

  // Byte length of a single row
  fixed32 step = 5;

  // Legacy inline raw image data. Current high-rate camera transport may send
  // image bytes through shared memory and leave this field empty.
  bytes data = 6;

  // POSIX shared memory object name, for example "/mgx10v_cam_left".
  string shm_name = 8;

  // Byte offset of the image payload inside shm_name.
  fixed64 shm_offset = 9;

  // Number of valid image bytes in shared memory or raw payload.
  fixed64 data_size = 10;

  // Monotonic publisher sequence used to detect overwritten shared slots.
  fixed64 sequence = 11;

  // Shared memory ring slot index and slot count for diagnostics.
  fixed32 shm_slot = 12;
  fixed32 shm_slot_count = 13;
}
